<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Moje rezervacije</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">

    <h1>Moje rezervacije</h1>

    <div class="event-list">

        <div class="event-card" th:each="res : ${reservations}">

            <h3 th:text="${res.event.name}">Naziv događaja</h3>

            <p>
                <b>Datum i vreme:</b>
                <span th:text="${res.event.dateTime}">datum</span>
            </p>

            <p>
                <b>Kategorija:</b>
                <span th:text="${res.event.category}">kategorija</span>
            </p>

            <p>
                <b>Grad:</b>
                <span th:text="${res.event.location.city}">grad</span>
            </p>

            <p>
                <b>Rezervisano:</b>
                <span th:text="${res.createdAt}">vreme</span>
            </p>

            <!-- AKCIJE -->
            <a th:href="@{'/events/' + ${res.event.id}}" class="btn small">
                Detalji događaja
            </a>

            <form th:action="@{'/my-reservations/' + ${res.event.id} + '/delete'}" method="post" style="display:inline;">
                <button type="submit" class="btn small">
                    Otkaži rezervaciju
                </button>
            </form>

        </div>

    </div>

</div>

</body>
</html>
